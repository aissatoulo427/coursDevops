name: Démonstration CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Etape 1 - Initialisation
        run: |
          echo "Initialisation du pipeline..."
          java -version

      - name: Etape 2 - Récupération du code
        uses: actions/checkout@v4

      - name: Etape 3 - Build
        run: mvn clean compile

      - name: Etape 4 - Tests
        run: mvn test

      - name: Etape 5 - Packaging
        run: mvn package -DskipTests

      - name: Etape 6 - Fin du pipeline
        run: echo "Pipeline terminé avec succès !"